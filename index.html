 <!DOCTYPE html>
<html>
<head>
  <title>Private Women's Health Screening</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6fb;
      margin: 0;
    }

    header {
      background: #6b46c1;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .primary {
      background: #6b46c1;
      color: white;
    }

    .secondary {
      background: #ec4899;
      color: white;
    }

    .yes { background: #22c55e; color: white; }
    .no { background: #ef4444; color: white; }

    .small {
      font-size: 12px;
      color: gray;
      margin-top: 10px;
      text-align: center;
    }

    .result {
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 8px 15px;
      border-radius: 20px;
      color: white;
      margin-top: 10px;
    }

    .low { background: #22c55e; }
    .mid { background: #f59e0b; }
    .high { background: #ef4444; }
  </style>
</head>

<body>

<header>Women's Health Screening Tool</header>

<div class="container">

  <!-- HOME -->
  <div class="card" id="home">

    <h3>Your Details</h3>

    <input id="name" placeholder="Name (optional)">
    <input id="age" placeholder="Age">
    <input id="height" placeholder="Height (cm)">
    <input id="weight" placeholder="Weight (kg)">

    <button class="primary" onclick="startPCOS()">PCOS Screening</button>
    <button class="secondary" onclick="startBreast()">Breast Health Check</button>

    <div class="small">
      ✔ No login required <br>
      ✔ Your data is not stored <br>
      ⚠ This tool is for awareness only
    </div>

  </div>

  <!-- QUIZ -->
  <div class="card" id="quiz" style="display:none;"></div>

</div>

<script>

let step = 0;
let score = 0;
let questions = [];
let type = "";

function startPCOS() {
  type = "pcos";
  step = 0;
  score = 0;

  questions = [
    "Are your periods irregular?",
    "Do you have frequent acne?",
    "Do you notice facial hair growth?",
    "Do you have weight gain or difficulty losing weight?",
    "Do you feel high stress often?"
  ];

  showQuestion();
}

function startBreast() {
  type = "breast";
  step = 0;
  score = 0;

  questions = [
    "Do you feel any lump in breast?",
    "Any change in size/shape?",
    "Any skin dimpling?",
    "Any nipple discharge?",
    "Persistent pain?"
  ];

  showQuestion();
}

function showQuestion() {
  document.getElementById("home").style.display = "none";

  if (step < questions.length) {
    document.getElementById("quiz").style.display = "block";
    document.getElementById("quiz").innerHTML = `
      <h3>${questions[step]}</h3>
      <button class="yes" onclick="answer(1)">Yes</button>
      <button class="no" onclick="answer(0)">No</button>
    `;
  } else {
    showResult();
  }
}

function answer(val) {
  score += val;
  step++;
  showQuestion();
}

function getBMI() {
  let h = document.getElementById("height").value / 100;
  let w = document.getElementById("weight").value;

  if (!h || !w) return "N/A";
  return (w / (h*h)).toFixed(1);
}

function showResult() {

  let result = "";
  let className = "";
  let message = "";

  if (type === "pcos") {
    if (score <= 1) {
      result = "Low Risk";
      className = "low";
      message = "Minimal symptoms detected.";
    } else if (score <= 3) {
      result = "Moderate Risk";
      className = "mid";
      message = "Possible hormonal imbalance.";
    } else {
      result = "High Risk";
      className = "high";
      message = "Multiple symptoms present. Consider medical consultation.";
    }
  }

  if (type === "breast") {
    if (score >= 1) {
      result = "Attention Needed";
      className = "high";
      message = "Any breast symptom should be checked immediately.";
    } else {
      result = "No Immediate Risk";
      className = "low";
      message = "No concerning symptoms reported.";
    }
  }

  document.getElementById("quiz").innerHTML = `
    <div class="result">
      <h2>${result}</h2>
      <div class="badge ${className}">${result}</div>

      <p>${message}</p>

      <p><b>BMI:</b> ${getBMI()}</p>

      <p class="small">
        This tool does not provide medical diagnosis.<br>
        Please consult a doctor for confirmation.
      </p>

      <button onclick="location.reload()">Start Again</button>
    </div>
  `;
}

</script>

</body>
</html>
